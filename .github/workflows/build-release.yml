name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $ffmpegVersion = "n8.1"
          $ffmpegAssetName = "ffmpeg-n8.1-latest-win64-gpl-shared-8.1.zip"
          $ffmpegAssetSha256 = "35bacc587f1803d701315c0461cc833125b03eeeca7e122ce97fe8d995708a6a"
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/$ffmpegAssetName"
          $zipPath = "$env:RUNNER_TEMP\ffmpeg.zip"
          $extractPath = "$env:RUNNER_TEMP\ffmpeg-extract"
          $escapedFfmpegVersion = [regex]::Escape($ffmpegVersion)

          if (Test-Path "ffmpeg") {
            Remove-Item "ffmpeg" -Recurse -Force
          }

          Write-Host "Downloading FFmpeg $ffmpegVersion (shared build)..."
          Write-Host "Source URL: $ffmpegUrl"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath -UseBasicParsing

          $actualZipSha256 = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualZipSha256 -ne $ffmpegAssetSha256) {
            Write-Error "FFmpeg archive checksum mismatch. Expected $ffmpegAssetSha256, got $actualZipSha256"
            exit 1
          }
          Write-Host "FFmpeg archive checksum verified: $actualZipSha256"

          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          # Find the bin directory inside the extracted folder
          $binDir = Get-ChildItem -Path $extractPath -Recurse -Directory -Filter "bin" | Select-Object -First 1
          if (-not $binDir) {
            Write-Error "FFmpeg bin directory not found"
            exit 1
          }

          $versionLine = (& "$($binDir.FullName)\ffmpeg.exe" -version | Select-Object -First 1).Trim()
          Write-Host "Detected FFmpeg version: $versionLine"
          if ($versionLine -notmatch "^ffmpeg version $escapedFfmpegVersion(?:[\s-]|$)") {
            Write-Error "Unexpected FFmpeg version. Expected $ffmpegVersion, got: $versionLine"
            exit 1
          }

          $requiredFiles = @("ffmpeg.exe", "ffplay.exe", "ffprobe.exe")
          foreach ($file in $requiredFiles) {
            if (-not (Test-Path (Join-Path $binDir.FullName $file))) {
              Write-Error "Required FFmpeg binary not found: $file"
              exit 1
            }
          }

          $dlls = Get-ChildItem -Path $binDir.FullName -Filter "*.dll" -File
          if (-not $dlls) {
            Write-Error "No FFmpeg shared DLLs were found in $($binDir.FullName)"
            exit 1
          }

          # Copy ffmpeg executables and shared libraries to project ffmpeg/ directory
          New-Item -ItemType Directory -Path "ffmpeg" -Force | Out-Null
          Copy-Item "$($binDir.FullName)\ffmpeg.exe" -Destination "ffmpeg\ffmpeg.exe"
          Copy-Item "$($binDir.FullName)\ffplay.exe" -Destination "ffmpeg\ffplay.exe"
          Copy-Item "$($binDir.FullName)\ffprobe.exe" -Destination "ffmpeg\ffprobe.exe"
          # Copy all DLL files required by the shared build
          Copy-Item "$($binDir.FullName)\*.dll" -Destination "ffmpeg\"

          Write-Host "FFmpeg binaries and shared libraries copied to ffmpeg/"
          Get-ChildItem "ffmpeg"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $isccPath = "${env:ProgramFiles(x86)}\Inno Setup 6"
          echo "$isccPath" >> $env:GITHUB_PATH

          # 下载中文语言文件（默认安装不包含）
          $langDir = "$isccPath\Languages"
          $islUrl = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          Invoke-WebRequest -Uri $islUrl -OutFile "$langDir\ChineseSimplified.isl" -UseBasicParsing
          Write-Host "Chinese language file installed to $langDir"

      - name: Build & Package
        shell: pwsh
        run: |
          .\build.ps1 -Version "${{ steps.version.outputs.VERSION }}"

      - name: Rename installer with version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $installer = "dist\BeaverPushSetup.exe"
          $versionedInstaller = "dist\BeaverPushSetup-v$version.exe"

          if (-not (Test-Path $installer)) {
            Write-Error "Installer not found: $installer"
            exit 1
          }

          Move-Item -Path $installer -Destination $versionedInstaller
          echo "INSTALLER_PATH=$versionedInstaller" >> $env:GITHUB_ENV
          echo "INSTALLER_NAME=BeaverPushSetup-v$version.exe" >> $env:GITHUB_ENV

      - name: Test installer
        shell: pwsh
        run: |
          $installer = "${{ env.INSTALLER_PATH }}"
          $installDir = "C:\BeaverPush"

          Write-Host "=== Running silent install ==="
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/DIR=$installDir" -Wait

          Write-Host "=== Verifying installation ==="
          if (Test-Path $installDir) {
            Get-ChildItem $installDir | Select-Object Name | Format-Table -AutoSize
          }
          if (-not (Test-Path "$installDir\BeaverPush.exe")) {
            Write-Error "BeaverPush.exe not found after installation"
            exit 1
          }
          Write-Host "BeaverPush.exe found at $installDir"

          # List installed files
          Get-ChildItem $installDir | Select-Object Name, Length | Format-Table -AutoSize

          Write-Host "=== Launching exe to check for immediate crash ==="
          $proc = Start-Process -FilePath "$installDir\BeaverPush.exe" -PassThru
          Start-Sleep -Seconds 5

          if ($proc.HasExited -and $proc.ExitCode -ne 0) {
            Write-Error "BeaverPush.exe crashed on startup with exit code $($proc.ExitCode)"
            exit 1
          }

          # Stop the process
          if (-not $proc.HasExited) {
            $proc.Kill()
            Write-Host "App launched successfully and ran for 5 seconds without crash"
          } else {
            Write-Host "App exited cleanly with code $($proc.ExitCode)"
          }

          Write-Host "=== Uninstalling ==="
          $uninstaller = "$installDir\unins000.exe"
          if (Test-Path $uninstaller) {
            Start-Process -FilePath $uninstaller -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES" -Wait -NoNewWindow
            Write-Host "Uninstall completed"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.INSTALLER_NAME }}
          path: ${{ env.INSTALLER_PATH }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.INSTALLER_PATH }}
          generate_release_notes: true
